<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Meu Amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #2e004f 0%, #1a002b 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fundo Animado */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: 0;
            opacity: 0.5;
        }

        /* Tela de Senha Moderna */
        #passwordScreen {
            position: fixed;
            inset: 0;
            background: rgba(26, 0, 43, 0.98);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        input#passwordInput {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #2e004f;
            font-size: 1.1em;
            outline: none;
            text-align: center;
        }

        #enterButton {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #ff4d94, #ff99cc);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #enterButton:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* Conteúdo Principal */
        #hommageContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5em, 8vw, 4em);
            margin-bottom: 20px;
            background: linear-gradient(to right, #ff99cc, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(255, 77, 148, 0.4));
        }

        .message-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            line-height: 1.8;
            font-size: 1.1em;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Polaroid 2.0 */
        .photo-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .photo-card {
            width: 280px;
            height: 380px;
            perspective: 1000px;
        }

        .inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .photo-card.flip .inner { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            background: #fff;
            padding: 15px 15px 50px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .back {
            transform: rotateY(180deg);
            background: #fff;
            color: #2e004f;
            display: flex;
            padding: 30px;
            align-items: center;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8em;
            text-align: center;
        }

        /* Botões de Ação */
        .controls {
            margin-top: 60px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 18px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-decoration: none;
        }

        .btn-music { background: #fff; color: #2e004f; }
        .btn-gift { background: #ff4d94; color: #fff; }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }

        /* Corações */
        .heart {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: float linear forwards;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

    </style>
</head>
<body>
    <div class="stars"></div>

    <audio id="birthdayMusic" loop preload="auto">
        <source src="https://github.com/Kaicki/Anivers-rio-da-minha-gostosa-/raw/refs/heads/main/Djavan%20%20%20Um%20Amor%20Puro%20%20%20LETRA%20I%20LYRIC(MP3_320K).mp3" type="audio/mpeg">
    </audio>

    <div id="passwordScreen">
        <div class="login-card">
            <h2 style="margin-top:0">💝 Momento Especial</h2>
            <p>Somente para a mulher mais linda do mundo.</p>
            <input type="password" id="passwordInput" placeholder="Sua senha secreta...">
            <button id="enterButton">Abrir Presente</button>
            <p id="hint" style="font-size: 0.85em; margin-top: 15px; color: #ff99cc;"></p>
            <p id="error" style="color:#ff4d4d; display:none; font-size: 0.9em; margin-top: 10px;">Senha incorreta, tente de novo meu amor! 😢</p>
        </div>
    </div>

    <div id="hommageContainer">
        <h1 id="typedTitle"></h1>
        <div class="message-box">
            <p id="typedText"></p>
        </div>
        
        <div class="photo-gallery" id="gallery"></div>

        <div class="controls">
            <button class="btn btn-music" id="musicButton">Pausar Música ⏸️</button>
            <a href="https://kaicki.github.io/Flowers/" class="btn btn-gift">Sua Surpresa Final 🎁</a>
        </div>
    </div>

    <script>
        const senhaCorreta = "1";
        const dicaSenha = "💡 DICA: O QUE VOCÊ É? (Maiúsculas)";
        
        document.getElementById("hint").textContent = dicaSenha;

        document.getElementById("enterButton").addEventListener("click", () => {
            const input = document.getElementById("passwordInput").value.toUpperCase();
            const music = document.getElementById("birthdayMusic");

            if (input === senhaCorreta) {
                // Tenta tocar a música imediatamente após a interação do clique
                music.play().catch(e => console.log("Erro ao tocar música:", e));

                // Esconde a tela de senha
                document.getElementById("passwordScreen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("passwordScreen").style.display = "none";
                    document.getElementById("hommageContainer").style.display = "flex";
                    iniciarSite();
                }, 500);
            } else {
                document.getElementById("error").style.display = "block";
                document.getElementById("passwordInput").value = "";
            }
        });

        function iniciarSite() {
            const titulo = "Para você, Meu Amor...";
            const texto = `Bê… você é o acaso mais lindo que já aconteceu na minha vida. 💫 É impressionante como tudo fica mais leve quando você aparece — até o silêncio ganha som, e o mundo parece sorrir.\n\nEu amo o jeito que você ri das minhas brincadeiras sem graça, o jeito que reclama mas no fundo tá sorrindo, e o jeito que me faz querer ser alguém melhor só pra te fazer feliz. Você é meu refúgio, minha melodia, meu sentido de viver.\n\nFeliz aniversário, minha princesa, minha futura esposa. 🎂💞 Te amo daqui até o infinito. 💫`;

            let i = 0, j = 0;
            function digitarTitulo() {
                if (i < titulo.length) {
                    document.getElementById("typedTitle").innerHTML += titulo.charAt(i);
                    i++; setTimeout(digitarTitulo, 80);
                } else { setTimeout(digitarTexto, 500); }
            }

            function digitarTexto() {
                if (j < texto.length) {
                    document.getElementById("typedText").innerHTML += texto[j] === "\n" ? "<br>" : texto[j];
                    j++; setTimeout(digitarTexto, 30);
                }
            }

            digitarTitulo();

            const fotos = [
                ["https://github.com/user-attachments/assets/128f9cbf-805c-477b-9d58-f91d7f0b4430", "Esse olhar que me desmonta... 😍"],
                ["https://github.com/user-attachments/assets/313d96d1-e437-4d42-979b-2f5957127a0c", "Minha craque favorita 🏐✨"],
                ["https://github.com/user-attachments/assets/cb50c28f-cfb2-46dc-adcf-8a47c4958bdd", "Até brava você é perfeita! 😏"],
                ["https://github.com/user-attachments/assets/473bb60c-fbc2-4a6e-a14b-0aeff7baef18", "Uma verdadeira rainha 💃"],
                ["https://github.com/user-attachments/assets/636cc626-06e1-44a0-9f99-326a37b74bf0", "Sem palavras para você... 😍"],
                ["https://github.com/user-attachments/assets/5f1384ea-41f4-4ba9-b2a7-6aac28029180", "O sorriso que ilumina meu dia 😁"],
                ["https://github.com/user-attachments/assets/26a18edb-6e3c-4bb7-812d-4a70a16d8005", "Minha maior motivação 💖"],
                ["https://github.com/user-attachments/assets/0e0e848b-f7ca-4a28-bdd7-a30a4569d7a1", "Sempre a mais gata da festa 😈"],
                ["https://github.com/user-attachments/assets/edb88f91-a1cf-4d14-8cff-eb178ad54d00", "Meu presente de todos os dias 🎁"]
            ];

            const gallery = document.getElementById("gallery");
            fotos.forEach(f => {
                const card = document.createElement("div");
                card.className = "photo-card";
                card.innerHTML = `<div class="inner">
                    <div class="front"><img src="${f[0]}"></div>
                    <div class="back">${f[1]}</div>
                </div>`;
                card.onclick = () => card.classList.toggle("flip");
                gallery.appendChild(card);
            });

            // Chuva de corações constante
            setInterval(() => {
                const h = document.createElement("div");
                h.className = "heart";
                h.innerHTML = ["❤️","💖","✨","🌸","💜"][Math.floor(Math.random()*5)];
                h.style.left = Math.random() * 100 + "vw";
                h.style.animationDuration = (Math.random() * 3 + 2) + "s";
                h.style.fontSize = (Math.random() * 20 + 15) + "px";
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 350);

            // Controle Manual da Música (Caso ela queira pausar)
            const music = document.getElementById("birthdayMusic");
            document.getElementById("musicButton").onclick = function() {
                if (music.paused) { 
                    music.play(); 
                    this.textContent = "Pausar Música ⏸️"; 
                } else { 
                    music.pause(); 
                    this.textContent = "Tocar Música 🎵"; 
                }
            };
        }
    </script>
</body>
</html>
