<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Meu Amor ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #2e004f 0%, #1a002b 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            z-index: 0;
            opacity: 0.5;
        }

        #passwordScreen {
            position: fixed;
            inset: 0;
            background: rgba(26, 0, 43, 0.98);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        input#passwordInput {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #2e004f;
            font-size: 1.1em;
            outline: none;
            text-align: center;
        }

        #enterButton {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(45deg, #ff4d94, #ff99cc);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #hommageContainer {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5em, 8vw, 4em);
            margin-bottom: 20px;
            background: linear-gradient(to right, #ff99cc, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            line-height: 1.8;
            font-size: 1.1em;
            margin-bottom: 50px;
        }

        .photo-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .photo-card {
            width: 280px;
            height: 380px;
            perspective: 1000px;
        }

        .inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .photo-card.flip .inner { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            background: #fff;
            padding: 15px 15px 50px 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo para quando não tem foto */
        .front {
            background: #f0f0f0;
            color: #ccc;
            font-size: 3em;
        }

        .back {
            transform: rotateY(180deg);
            background: #fff;
            color: #2e004f;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8em;
            text-align: center;
        }

        .controls {
            margin-top: 60px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 18px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .btn-music { background: #fff; color: #2e004f; }
        .btn-gift { background: #ff4d94; color: #fff; }

        .heart {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: float linear forwards;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>

    <audio id="birthdayMusic" loop preload="auto">
        <source src="https://github.com/Kaicki/Anivers-rio-da-minha-gostosa-/raw/refs/heads/main/Djavan%20%20%20Um%20Amor%20Puro%20%20%20LETRA%20I%20LYRIC(MP3_320K).mp3" type="audio/mpeg">
    </audio>

    <div id="passwordScreen">
        <div class="login-card">
            <h2 style="margin-top:0">💝 Momento Especial</h2>
            <p>Somente para a mulher mais linda do mundo.</p>
            <input type="password" id="passwordInput" placeholder="Sua senha secreta...">
            <button id="enterButton">Abrir Presente</button>
            <p id="hint" style="font-size: 0.85em; margin-top: 15px; color: #ff99cc;"></p>
            <p id="error" style="color:#ff4d4d; display:none; font-size: 0.9em; margin-top: 10px;">Senha incorreta! 😢</p>
        </div>
    </div>

    <div id="hommageContainer">
        <h1 id="typedTitle"></h1>
        <div class="message-box">
            <p id="typedText"></p>
        </div>
        
        <div class="photo-gallery" id="gallery"></div>

        <div class="controls">
            <button class="btn btn-music" id="musicButton">Pausar Música ⏸️</button>
            <a href="https://kaicki.github.io/Flowers/" class="btn btn-gift">Sua Surpresa Final 🎁</a>
        </div>
    </div>

    <script>
        const senhaCorreta = "1";
        const dicaSenha = "💡 DICA: O QUE VOCÊ É? (Maiúsculas)";
        
        document.getElementById("hint").textContent = dicaSenha;

        document.getElementById("enterButton").addEventListener("click", () => {
            const input = document.getElementById("passwordInput").value.toUpperCase();
            const music = document.getElementById("birthdayMusic");

            if (input === senhaCorreta) {
                music.play().catch(e => console.log("Erro ao tocar música:", e));
                document.getElementById("passwordScreen").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("passwordScreen").style.display = "none";
                    document.getElementById("hommageContainer").style.display = "flex";
                    iniciarSite();
                }, 500);
            } else {
                document.getElementById("error").style.display = "block";
            }
        });

        function iniciarSite() {
            const titulo = "Para você, Meu Amor...";
            const texto = `Bê… você é o acaso mais lindo que já aconteceu na minha vida. 💫\n\nEu amo cada detalhe seu e o jeito que você me faz querer ser alguém melhor. Você é meu refúgio e meu sentido de viver.\n\nFeliz aniversário, minha princesa. 🎂💞 Te amo daqui até o infinito. 💫`;

            let i = 0, j = 0;
            function digitarTitulo() {
                if (i < titulo.length) {
                    document.getElementById("typedTitle").innerHTML += titulo.charAt(i);
                    i++; setTimeout(digitarTitulo, 80);
                } else { setTimeout(digitarTexto, 500); }
            }

            function digitarTexto() {
                if (j < texto.length) {
                    document.getElementById("typedText").innerHTML += texto[j] === "\n" ? "<br>" : texto[j];
                    j++; setTimeout(digitarTexto, 30);
                }
            }

            digitarTitulo();

            // ARRAY DE FOTOS (LINKS REMOVIDOS)
            const fotos = [
                ["", "Esse olhar que me desmonta... 😍"],
                ["", "Minha craque favorita 🏐✨"],
                ["", "Até brava você é perfeita! 😏"],
                ["", "Uma verdadeira rainha 💃"],
                ["", "O sorriso que ilumina meu dia 😁"],
                ["", "Meu presente de todos os dias 🎁"]
            ];

            const gallery = document.getElementById("gallery");
            fotos.forEach(f => {
                const card = document.createElement("div");
                card.className = "photo-card";
                // Se o link da foto estiver vazio, exibe um coração
                const conteudoFront = f[0] ? `<img src="${f[0]}" style="width:100%; height:100%; object-fit:cover; border-radius:8px;">` : `❤️`;
                
                card.innerHTML = `<div class="inner">
                    <div class="front">${conteudoFront}</div>
                    <div class="back">${f[1]}</div>
                </div>`;
                card.onclick = () => card.classList.toggle("flip");
                gallery.appendChild(card);
            });

            setInterval(() => {
                const h = document.createElement("div");
                h.className = "heart";
                h.innerHTML = ["❤️","💖","✨","🌸","💜"][Math.floor(Math.random()*5)];
                h.style.left = Math.random() * 100 + "vw";
                h.style.animationDuration = (Math.random() * 3 + 2) + "s";
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 4000);
            }, 350);

            const music = document.getElementById("birthdayMusic");
            document.getElementById("musicButton").onclick = function() {
                if (music.paused) { 
                    music.play(); 
                    this.textContent = "Pausar Música ⏸️"; 
                } else { 
                    music.pause(); 
                    this.textContent = "Tocar Música 🎵"; 
                }
            };
        }
    </script>
</body>
</html>
